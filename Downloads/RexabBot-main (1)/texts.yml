faq:
  title: '❓ Частые вопросы


    Выберите номер вопроса или задайте свой:'
  items:
  - q: Это анонимно?
    a: 'Да. Мы бережно относимся к конфиденциальности.

      Вы можете обращаться без лишних данных.

      Мы обсуждаем только то, что необходимо для помощи.'
  - q: Ставят ли на учёт?
    a: 'Нет, наша помощь не означает автоматическую постановку на учёт.

      Если у вас есть вопросы по вашей ситуации — уточните у администратора.'
  - q: Передаёте ли данные куда-либо?
    a: 'Мы не передаем данные третьим лицам без оснований.

      В боте мы стараемся не собирать лишнюю информацию.'
  - q: Что делать, если человек отказывается?
    a: 'Это частая ситуация.

      Мы подскажем, как спокойно выстроить разговор и что можно сделать безопасно.'
  - q: Это законно?
    a: 'Да. Мы работаем в рамках законодательства.

      Подробности можно уточнить у администратора.'
