services:
  title: '🧾 Наши услуги


    Выберите интересующую услугу:'
  items:
    detox:
      name: Вывод из запоя
      short: Помощь при запое и тяжелом состоянии.
      when: Когда состояние ухудшается и нужна безопасная поддержка.
      steps:
      - Коротко уточняем симптомы
      - Врач оценивает состояние
      - Проводим необходимые процедуры
      - Даем дальнейшие рекомендации (без дозировок в боте)
      duration: Зависит от состояния
      price: Стоимость зависит от состояния
    iv:
      name: Капельницы
      short: Поддержка при интоксикации и плохом самочувствии.
      when: Если нужно облегчить состояние и снизить симптомы интоксикации.
      steps:
      - Уточняем жалобы
      - Врач подбирает тактику
      - Процедура под наблюдением
      duration: Обычно 1–2 часа
      price: Стоимость зависит от состояния
    rehab:
      name: Реабилитация
      short: Программа восстановления и поддержки.
      when: Если важна системная работа и устойчивый результат.
      steps:
      - Первичная консультация
      - Подбор программы
      - Сопровождение и поддержка
      duration: Зависит от программы
      price: Стоимость зависит от программы
    consult:
      name: Консультация специалиста
      short: Разбор ситуации и план действий.
      when: Если нужна ясность и спокойный план.
      steps:
      - Уточняем запрос
      - Консультация
      - Следующие шаги
      duration: 30–60 минут
      price: Стоимость зависит от формата
    family:
      name: Поддержка для родственников
      short: Помогаем близким понять, что делать дальше.
      when: Если вы не знаете, как разговаривать и как помочь.
      steps:
      - Уточняем ситуацию
      - Консультация
      - План поддержки
      duration: Зависит от запроса
      price: Стоимость зависит от формата
faq:
  title: '❓ Частые вопросы


    Выберите номер вопроса или задайте свой:'
  items:
  - q: Это анонимно?
    a: 'Да. Мы бережно относимся к конфиденциальности.

      Вы можете обращаться без лишних данных.

      Мы обсуждаем только то, что необходимо для помощи.'
  - q: Ставят ли на учёт?
    a: 'Нет, наша помощь не означает автоматическую постановку на учёт.

      Если у вас есть вопросы по вашей ситуации — уточните у администратора.'
  - q: Передаёте ли данные куда-либо?
    a: 'Мы не передаем данные третьим лицам без оснований.

      В боте мы стараемся не собирать лишнюю информацию.'
  - q: Что делать, если человек отказывается?
    a: 'Это частая ситуация.

      Мы подскажем, как спокойно выстроить разговор и что можно сделать безопасно.'
  - q: Это законно?
    a: 'Да. Мы работаем в рамках законодательства.

      Подробности можно уточнить у администратора.'
